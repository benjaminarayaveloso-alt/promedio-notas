<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mis Notas - Benjamín</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-color: #1c1c1e;
            --border-color: #38383a;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --accent-blue: #0a84ff;
            --accent-green: #30d158;
            --accent-red: #ff453a;
            --siri-gradient: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 50%, #ae00ff 100%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 180px;
        }

        .container { max-width: 900px; margin: 0 auto; }
        .header { margin-bottom: 30px; }
        .header h1 { font-size: 34px; font-weight: 700; margin: 0; }
        .header p { color: var(--text-secondary); margin: 5px 0 0; }

        .semester-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .semester-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--accent-blue);
        }

        .subject-card {
            background-color: var(--card-color);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }

        .subject-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .subject-title-area h3 { font-size: 16px; margin: 0; font-weight: 600; max-width: 70%; }
        .avg-value { font-size: 24px; font-weight: 700; }

        .add-note-area {
            display: flex; gap: 8px; margin-bottom: 12px;
            background: #2c2c2e; padding: 6px; border-radius: 10px;
        }

        .add-note-area input {
            flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; padding-left: 10px;
        }

        .add-note-area button {
            background: var(--accent-blue); color: white; border: none;
            width: 34px; height: 34px; border-radius: 10px; font-weight: bold;
        }

        .grades-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .grade-box {
            background: #252525; border: 1px solid var(--border-color);
            border-radius: 8px; width: 44px; height: 44px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }
        .grade-val { font-weight: 600; font-size: 15px; }
        .grade-num { font-size: 8px; color: var(--text-secondary); }

        .delete-grade {
            position: absolute; top: -8px; right: -8px;
            background: var(--accent-red); color: white; border: none;
            border-radius: 50%; width: 20px; height: 20px; font-size: 14px;
        }

        .voice-trigger-container {
            position: fixed; bottom: 110px; left: 50%;
            transform: translateX(-50%); z-index: 1000;
            text-align: center; width: 100%;
        }

        #siri-btn {
            width: 70px; height: 70px; border-radius: 50%;
            background: var(--siri-gradient);
            border: none; cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto;
            transition: transform 0.2s;
        }

        #siri-btn:active { transform: scale(0.9); }

        #siri-btn.listening { animation: pulse 1.2s infinite linear; }

        @keyframes pulse {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.3); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        #voice-status {
            margin: 15px auto; font-size: 14px; color: white;
            background: rgba(44, 44, 46, 0.9); padding: 8px 20px; border-radius: 20px;
            width: fit-content; display: none; border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .summary-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            padding: 15px 10px 40px;
            display: flex; justify-content: space-around; z-index: 900;
        }

        .summary-item { text-align: center; }
        .summary-item .label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }
        .summary-item .value { font-size: 24px; font-weight: 700; }
        .summary-item.main .value { color: var(--accent-green); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Mis Notas</h1>
        <p>Benjamín Araya • 4to Medio</p>
    </div>

    <div class="semester-grid">
        <div class="semester-col">
            <h2 class="semester-title">1° Semestre</h2>
            <div id="container-s1"></div>
        </div>
        <div class="semester-col">
            <h2 class="semester-title">2° Semestre</h2>
            <div id="container-s2"></div>
        </div>
    </div>
</div>

<div class="voice-trigger-container">
    <div id="voice-status"></div>
    <button id="siri-btn" onclick="toggleVoice()">
        <svg width="35" height="35" viewBox="0 0 24 24" fill="white">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
    </button>
</div>

<div class="summary-bar">
    <div class="summary-item"><div class="label">S1</div><div class="value" id="res-s1">0.0</div></div>
    <div class="summary-item main"><div class="label">ANUAL</div><div class="value" id="res-anual">0.0</div></div>
    <div class="summary-item"><div class="label">S2</div><div class="value" id="res-s2">0.0</div></div>
</div>

<script>
    const subjects = [
        "Lengua y Literatura", "Matemática", "Inglés", "Historia y Geografía", 
        "Ciencias Ciudadanas", "Educación ciudadana", "Educación Física", "Filosofía",
        "Antropología", "Promoción de vida saludable", "Estética y Política", "Geografía"
    ];

    let data = JSON.parse(localStorage.getItem('grades_v4')) || { s1: {}, s2: {} };

    // --- MEJORA IPHONE: INSTANCIA GLOBAL ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'es-CL';
        recognition.interimResults = false;
        recognition.continuous = false;
    }

    function init() {
        for (let i = 0; i < 12; i++) {
            if (!data.s1[i]) data.s1[i] = [];
            if (!data.s2[i]) data.s2[i] = [];
        }
        render();
    }

    function save() { localStorage.setItem('grades_v4', JSON.stringify(data)); }

    const round5 = (v) => Math.round((v + Number.EPSILON) * 10) / 10;

    function render() {
        ['s1', 's2'].forEach(sem => {
            const cont = document.getElementById(`container-${sem}`);
            cont.innerHTML = '';
            subjects.forEach((name, i) => {
                const gr = data[sem][i];
                const avg = gr.length > 0 ? round5(gr.reduce((a,b)=>a+b,0)/gr.length) : 0.0;
                cont.innerHTML += `
                    <div class="subject-card">
                        <div class="subject-header">
                            <div class="subject-title-area"><h3>${name}</h3></div>
                            <div class="avg-value">${avg.toFixed(1)}</div>
                        </div>
                        <div class="add-note-area">
                            <input type="number" inputmode="decimal" step="0.1" placeholder="Nota" id="in-${sem}-${i}">
                            <button onclick="addNote('${sem}',${i})">+</button>
                        </div>
                        <div class="grades-container">
                            ${gr.map((n, idx) => `
                                <div class="grade-box">
                                    <button class="delete-grade" onclick="delNote('${sem}',${i},${idx})">×</button>
                                    <div class="grade-num">${idx+1}</div>
                                    <div class="grade-val">${n.toFixed(1)}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            });
        });
        calc();
    }

    function addNote(sem, i) {
        const inp = document.getElementById(`in-${sem}-${i}`);
        const val = parseFloat(inp.value.replace(',', '.'));
        if (val >= 1 && val <= 7) { data[sem][i].push(val); save(); render(); inp.value = ''; }
    }

    function delNote(sem, i, idx) { data[sem][i].splice(idx,1); save(); render(); }

    function calc() {
        let sAvgs = { s1: [], s2: [] };
        ['s1','s2'].forEach(sem => {
            for(let i=0; i<12; i++) {
                const g = data[sem][i];
                if(g.length > 0) sAvgs[sem].push(round5(g.reduce((a,b)=>a+b,0)/g.length));
            }
        });
        const fs1 = sAvgs.s1.length > 0 ? round5(sAvgs.s1.reduce((a,b)=>a+b,0)/sAvgs.s1.length) : 0.0;
        const fs2 = sAvgs.s2.length > 0 ? round5(sAvgs.s2.reduce((a,b)=>a+b,0)/sAvgs.s2.length) : 0.0;
        let fa = (fs1 > 0 && fs2 > 0) ? round5((fs1+fs2)/2) : (fs1 || fs2);
        document.getElementById('res-s1').innerText = fs1.toFixed(1);
        document.getElementById('res-s2').innerText = fs2.toFixed(1);
        document.getElementById('res-anual').innerText = fa.toFixed(1);
    }

    // --- FUNCIÓN DE VOZ OPTIMIZADA ---
    function toggleVoice() {
        if (!recognition) {
            alert("Tu navegador no soporta reconocimiento de voz. Usa Safari en iPhone.");
            return;
        }

        const btn = document.getElementById('siri-btn');
        const status = document.getElementById('voice-status');

        // Configurar eventos
        recognition.onstart = () => { 
            btn.classList.add('listening'); 
            status.style.display = 'block';
            status.innerText = "Te escucho...";
        };

        recognition.onresult = (e) => {
            let text = e.results[0][0].transcript.toLowerCase();
            status.innerText = `Dijo: "${text}"`;
            
            // Lógica de mapeo de números
            const numMap = {"uno":1,"dos":2,"tres":3,"cuatro":4,"cinco":5,"seis":6,"siete":7};
            Object.keys(numMap).forEach(key => {
                text = text.replace(new RegExp(key, 'g'), numMap[key]);
            });

            let cleanText = text.replace(',', '.').replace(' y ', '.').replace(' coma ', '.').replace(' punto ', '.');
            let gradeMatch = cleanText.match(/\d+(\.\d+)?/);
            let grade = gradeMatch ? parseFloat(gradeMatch[0]) : null;

            if (grade && grade > 10 && grade <= 70) grade /= 10;

            let idx = -1;
            if (text.includes("historia")) idx = 3;
            else if (text.includes("geografía") && !text.includes("historia")) idx = 11;
            else if (text.includes("ciencias") && (text.includes("ciudadanía") || text.includes("ciudadana"))) idx = 4;
            else {
                subjects.forEach((s, i) => {
                    const words = s.toLowerCase().split(' ');
                    words.forEach(w => { if(w.length > 3 && text.includes(w)) idx = i; });
                });
            }

            if (idx !== -1 && grade >= 1 && grade <= 7) {
                const sem = text.includes('segundo') || text.includes('2') ? 's2' : 's1';
                data[sem][idx].push(grade);
                save(); render();
                status.innerText = `✅ ${subjects[idx]}: ${grade.toFixed(1)}`;
            } else {
                status.innerText = "❌ No entendí bien";
            }
        };

        recognition.onend = () => { 
            btn.classList.remove('listening'); 
            setTimeout(() => status.style.display = 'none', 3000);
        };

        recognition.onerror = (event) => {
            btn.classList.remove('listening');
            status.innerText = "Error: " + event.error;
            console.error("Error micro:", event.error);
        };

        // Iniciar o detener según estado
        try {
            recognition.start();
        } catch (e) {
            recognition.stop();
        }
    }

    init();
</script>
</body>
</html>
